<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background with gradient -->
  <rect x="2" y="2" width="28" height="28" rx="6" ry="6" fill="url(#gradient)"/>
  
  <!-- Simplified conversion symbol: [→] -->
  <!-- Left bracket -->
  <rect x="8" y="10" width="2" height="12" fill="white"/>
  <rect x="8" y="10" width="4" height="2" fill="white"/>
  <rect x="8" y="20" width="4" height="2" fill="white"/>
  
  <!-- Arrow -->
  <polygon points="15,16 18,13 18,15 20,15 20,17 18,17 18,19" fill="white"/>
  
  <!-- Right bracket -->
  <rect x="22" y="10" width="2" height="12" fill="white"/>
  <rect x="20" y="10" width="4" height="2" fill="white"/>
  <rect x="20" y="20" width="4" height="2" fill="white"/>
</svg>