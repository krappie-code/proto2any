<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Dark background circle for better visibility -->
  <circle cx="16" cy="16" r="15" fill="#12121a" stroke="#1e1e2e" stroke-width="2"/>
  
  <!-- Left bracket representing "proto" input -->
  <path d="M8 10 L6 10 Q4 10 4 12 L4 20 Q4 22 6 22 L8 22" 
        fill="none" 
        stroke="url(#gradient)" 
        stroke-width="2" 
        stroke-linecap="round"/>
  
  <!-- Right bracket representing converted output -->
  <path d="M24 10 L26 10 Q28 10 28 12 L28 20 Q28 22 26 22 L24 22" 
        fill="none" 
        stroke="url(#gradient)" 
        stroke-width="2" 
        stroke-linecap="round"/>
  
  <!-- Transformation arrow in the middle -->
  <path d="M11 16 L21 16 M18 13 L21 16 L18 19" 
        fill="none" 
        stroke="url(#gradient)" 
        stroke-width="2" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Small data dots to suggest protocol buffer data -->
  <circle cx="10" cy="14" r="1" fill="url(#gradient)" opacity="0.8"/>
  <circle cx="10" cy="18" r="1" fill="url(#gradient)" opacity="0.8"/>
  <circle cx="22" cy="14" r="1" fill="url(#gradient)" opacity="0.8"/>
  <circle cx="22" cy="16" r="1" fill="url(#gradient)" opacity="0.8"/>
  <circle cx="22" cy="18" r="1" fill="url(#gradient)" opacity="0.8"/>
</svg>